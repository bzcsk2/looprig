name: Feature request
description: Suggest an improvement or new capability
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Covalo do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - TUI
        - Workflow
        - Provider
        - Local model
        - Tools
        - MCP
        - Skills
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
