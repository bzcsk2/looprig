name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.1.2"
        required: true
        type: string
      publish_to_npm:
        description: "Publish @deepreef/cli to npm"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ inputs.version }}" ]; then
            echo "package.json version is $PACKAGE_VERSION, but release input is ${{ inputs.version }}"
            exit 1
          fi

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test
        env:
          CI: "true"

      - name: Build CLI bundle
        run: bun run build

      - name: CLI help smoke test
        run: node ./dist/index.js --help
        env:
          CI: "true"

      - name: Check npm package contents
        run: npm pack --dry-run

      - name: Publish to npm
        if: inputs.publish_to_npm == true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "See CHANGELOG.md for release notes."
